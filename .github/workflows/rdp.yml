name: JPRO Interactive RDP
on:
  workflow_dispatch:
    inputs:
      minutes:
        description: "Keep the RDP session open this many minutes (max 350)"
        default: "180"

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 355
    steps:
      - name: Enable RDP + set admin password
        shell: pwsh
        run: |
          net user runneradmin "${{ secrets.RDP_PASSWORD }}"
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name UserAuthentication -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "RDP enabled (user: runneradmin)"

      - name: Start JPRO install in background
        shell: pwsh
        run: |
          Invoke-WebRequest "https://s3.amazonaws.com/JPROUpdate/JPRO+Fleet+Diagnostics/JproFullSetup.exe" -OutFile C:\setup.exe
          Start-Process C:\setup.exe -ArgumentList '/quiet','/norestart'
          New-Item -ItemType Directory -Force C:\jpro_drop | Out-Null
          Write-Host "JPRO bootstrapper launched in background; finish/activate it inside the RDP session."
          Write-Host "Save screenshots to C:\jpro_drop so the next step uploads them."

      - name: Open bore.pub tunnel + hold the session
        shell: pwsh
        run: |
          # bore via cargo (Rust is preinstalled on the runner)
          cargo install bore-cli 2>&1 | Select-Object -Last 3
          $bore = "$env:USERPROFILE\.cargo\bin\bore.exe"
          Start-Process $bore -ArgumentList 'local','3389','--to','bore.pub' -RedirectStandardOutput C:\bore.out -RedirectStandardError C:\bore.err -NoNewWindow
          Start-Sleep 10
          Write-Host "==================== CONNECT INFO ===================="
          Get-Content C:\bore.out,C:\bore.err -EA SilentlyContinue | Write-Host
          Write-Host "RDP to the 'bore.pub:PORT' shown above"
          Write-Host "  user: runneradmin"
          Write-Host "  pass: (the RDP_PASSWORD secret you set)"
          Write-Host "====================================================="
          $mins=[int]"${{ inputs.minutes }}"
          for($i=0;$i -lt $mins;$i++){
            Start-Sleep 60
            if($i % 5 -eq 0){ (Get-Content C:\bore.out -EA SilentlyContinue | Select-String 'bore.pub' | Select -Last 1) | Write-Host; Write-Host "session alive: $i / $mins min" }
          }

      - name: Upload anything dropped in C:\jpro_drop
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force shots | Out-Null
          Copy-Item C:\jpro_drop\* shots\ -Recurse -EA SilentlyContinue
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jpro-rdp-shots
          path: shots
