name: Windows Software Extractor

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: "Direct URL to installer (.exe/.msi) or archive"
        required: true
      archive_password:
        description: "Archive password (optional)"
        required: false
        default: ""

jobs:
  extract:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Download
        shell: pwsh
        run: Invoke-WebRequest -Uri "${{ inputs.download_url }}" -OutFile installer.bin

      - name: Extract
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          choco install 7zip -y --no-progress | Out-Null
          $z = "C:\Program Files\7-Zip\7z.exe"
          New-Item -ItemType Directory -Force out | Out-Null
          $pw = "${{ inputs.archive_password }}"
          # give it an .exe name so Windows can actually launch a bundle/installer
          Copy-Item installer.bin installer.exe -Force
          # WiX/EXE bundle: /layout extracts inner MSI + runtimes, bounded so it can't hang
          try {
            $p = Start-Process .\installer.exe -ArgumentList '/layout','C:\layout','/quiet' -PassThru
            if ($p) { if (-not $p.WaitForExit(480000)) { Write-Host '/layout timed out - killing'; $p.Kill() } }
          } catch { Write-Host "layout skipped: $_" }
          # generic crack-open (rar/zip/nsis/inno/msi) - works by content regardless of extension
          & $z x installer.bin "-oout" -y ("-p" + $pw)
          # any MSI (from layout or 7z) -> administrative install = extract files, no real install
          Get-ChildItem -Recurse out,C:\layout -Filter *.msi -ErrorAction SilentlyContinue | ForEach-Object {
            try {
              $p2 = Start-Process msiexec -ArgumentList '/a',('"'+$_.FullName+'"'),('TARGETDIR="'+$PWD+'\msi_out"'),'/qn' -PassThru
              if (-not $p2.WaitForExit(480000)) { $p2.Kill() }
            } catch {}
          }
          Write-Host "extract step done"; exit 0

      - name: Collect images and databases
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts\pictures | Out-Null
          $src = @("out","msi_out","C:\layout") | Where-Object { Test-Path $_ }
          Get-ChildItem -Recurse $src -Include *.png,*.jpg,*.jpeg,*.bmp,*.ico -ErrorAction SilentlyContinue | Copy-Item -Destination artifacts\pictures -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse $src -Include *.db,*.sdf,*.sqlite,*.mdb,*.accdb -ErrorAction SilentlyContinue | Copy-Item -Destination artifacts -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse $src -ErrorAction SilentlyContinue | Select-Object FullName,Length | Export-Csv artifacts\manifest.csv -NoTypeInformation

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: extracted
          path: artifacts
