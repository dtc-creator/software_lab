name: Windows Software Extractor

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: "Direct URL to installer (.exe/.msi) or archive"
        required: true
      archive_password:
        description: "Archive password (optional)"
        required: false
        default: ""

jobs:
  extract:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Download
        shell: pwsh
        run: Invoke-WebRequest -Uri "${{ inputs.download_url }}" -OutFile installer.bin

      - name: Extract
        shell: pwsh
        timeout-minutes: 12
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          choco install 7zip -y --no-progress | Out-Null
          $z = "C:\Program Files\7-Zip\7z.exe"
          New-Item -ItemType Directory -Force out,msi_out,layout | Out-Null
          $pw = "${{ inputs.archive_password }}"
          Copy-Item installer.bin installer.exe -Force
          # 1) generic crack-open: handles zip/rar/nsis/inno/most exe + msi (by content)
          & $z x installer.bin "-oout" -y ("-p" + $pw)
          # 2) WiX bundle: dark.exe extracts payloads (incl. inner MSI) synchronously - no relaunch
          choco install wixtoolset -y --no-progress | Out-Null
          $dark = Get-ChildItem 'C:\Program Files (x86)\WiX Toolset*\bin\dark.exe' -EA SilentlyContinue | Select-Object -First 1
          if ($dark) { & $dark.FullName -x layout installer.exe } else { Write-Host 'dark.exe not found' }
          # 3) any MSI found -> administrative install = extract files, no real install
          Get-ChildItem -Recurse out,layout -Filter *.msi -EA SilentlyContinue | ForEach-Object {
            Start-Process msiexec -ArgumentList '/a',('"'+$_.FullName+'"'),('TARGETDIR="'+$PWD+'\msi_out"'),'/qn' -Wait
          }
          Write-Host "extract step done"

      - name: Collect images and databases
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts\pictures | Out-Null
          # always grab the product icon straight from the exe (works even if extraction failed)
          try {
            Add-Type -AssemblyName System.Drawing
            $ico = [System.Drawing.Icon]::ExtractAssociatedIcon((Resolve-Path installer.exe))
            $ico.ToBitmap().Save("$PWD\artifacts\pictures\app_icon.png")
          } catch { Write-Host "icon grab failed: $_" }
          $src = @("out","msi_out","layout") | Where-Object { Test-Path $_ }
          if ($src) {
            Get-ChildItem -Recurse $src -Include *.png,*.jpg,*.jpeg,*.bmp,*.ico -EA SilentlyContinue | Copy-Item -Destination artifacts\pictures -EA SilentlyContinue
            Get-ChildItem -Recurse $src -Include *.db,*.sdf,*.sqlite,*.mdb,*.accdb -EA SilentlyContinue | Copy-Item -Destination artifacts -EA SilentlyContinue
            Get-ChildItem -Recurse $src -EA SilentlyContinue | Select-Object FullName,Length | Export-Csv artifacts\manifest.csv -NoTypeInformation
          }
          Write-Host ("images: " + (Get-ChildItem artifacts\pictures -EA SilentlyContinue).Count)

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: extracted
          path: artifacts
